name: CI
name: Playwright CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-playwright:
    # Use Playwright's official Node image which includes Node and browser deps
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Node
        run: node --version && npm --version

      - name: Create test artifact
        run: |
          echo "TEST_BODY - artifact test" > body.txt
          echo "Another body example" >> body.txt

      - name: Install dependencies
        working-directory: playwright
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps

      - name: Run Playwright script
        working-directory: playwright
        run: |
          node fetch_h1s.js

      - name: Force-create artifact in workspace
        run: |
          echo "BRUTE_FORCE_BODY_ARTIFACT" > "${GITHUB_WORKSPACE}/body.txt"
          echo "Forced at $(date) by $(whoami)" >> "${GITHUB_WORKSPACE}/body.txt"
          ls -la "${GITHUB_WORKSPACE}"
          echo "--- body.txt contents ---"
          cat "${GITHUB_WORKSPACE}/body.txt" || true

      - name: Upload scrape results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: |
            ${{ github.workspace }}/body.txt
            ${{ github.workspace }}/playwright/body.txt
