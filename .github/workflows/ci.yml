name: CI
name: Playwright CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-playwright:
    # Use Playwright's official Node image which includes Node and browser deps
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Node
        run: node --version && npm --version

      - name: Create test artifact
        run: |
          echo "TEST_H1 - artifact test" > h1s.txt
          echo "Another H1 example" >> h1s.txt

      - name: Install dependencies
        working-directory: playwright
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright script
        run: |
          node playwright/fetch_h1s.js

      - name: Force-create artifact in workspace
        run: |
          echo "BRUTE_FORCE_ARTIFACT" > "${GITHUB_WORKSPACE}/h1s.txt"
          echo "Forced at $(date) by $(whoami)" >> "${GITHUB_WORKSPACE}/h1s.txt"
          ls -la "${GITHUB_WORKSPACE}"
          echo "--- h1s.txt contents ---"
          cat "${GITHUB_WORKSPACE}/h1s.txt" || true

      - name: Upload h1 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h1-results
          path: |
            ${{ github.workspace }}/h1s.txt
            ${{ github.workspace }}/body.txt
