name: CI
name: Playwright CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-playwright:
    # Use Playwright's official Node image which includes Node and browser deps
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Node
        run: node --version && npm --version

      # Removed brute-force test artifact creation; rely on scraper outputs

      - name: Install dependencies
        working-directory: playwright
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps

      - name: Run Playwright script
        working-directory: playwright
        run: |
          node fetch_h1s.js

      - name: Show generated files
        run: |
          echo "--- repo root files ---"
          ls -la "${GITHUB_WORKSPACE}" || true
          echo "--- playwright dir files ---"
          ls -la "${GITHUB_WORKSPACE}/playwright" || true
          echo "--- gh-artifacts at repo root ---"
          ls -la "${GITHUB_WORKSPACE}/gh-artifacts" || true
          echo "--- playwright/gh-artifacts ---"
          ls -la "${GITHUB_WORKSPACE}/playwright/gh-artifacts" || true
          echo "--- cat playwright/h3s.txt if exists ---"
          cat "${GITHUB_WORKSPACE}/playwright/h3s.txt" || true
          echo "--- cat playwright/gh-artifacts/h1s.txt if exists ---"
          cat "${GITHUB_WORKSPACE}/playwright/gh-artifacts/h1s.txt" || true

      # Removed force-create artifact step; upload will include scraper outputs

      - name: Upload scrape results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: |
            ${{ github.workspace }}/body.txt
            ${{ github.workspace }}/h3s.txt
            ${{ github.workspace }}/playwright/body.txt
            ${{ github.workspace }}/playwright/h3s.txt
            ${{ github.workspace }}/playwright/gh-artifacts/h1s.txt
