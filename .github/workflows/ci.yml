name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  check_readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make check script executable
        run: chmod +x scripts/check_readme.sh || true
      - name: Check README
        run: ./scripts/check_readme.sh

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run tests
        run: |
          pytest -q | tee pytest-results.txt
          echo "--- workspace listing ---"
          ls -la
          echo "--- pytest-results.txt (first 200 lines) ---"
          head -n 200 pytest-results.txt || true

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pytest-logs
          path: pytest-results.txt
